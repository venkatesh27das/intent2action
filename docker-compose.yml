services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      LMSTUDIO_BASE_URL: ${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      LMSTUDIO_MODEL: ${LMSTUDIO_MODEL:-local-model}
    command: uvicorn intent2action.app.main:app --host 0.0.0.0 --port 8000

  ui:
    build: .
    ports:
      - "8501:8501"
    environment:
      LMSTUDIO_BASE_URL: ${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      LMSTUDIO_MODEL: ${LMSTUDIO_MODEL:-local-model}
    command: streamlit run intent2action/ui/streamlit_app.py --server.address 0.0.0.0

