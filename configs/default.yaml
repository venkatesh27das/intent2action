model_provider:
  type: "openai_compatible"
  base_url: "http://localhost:1234/v1"
  api_key: "not-needed"
  model: "local-model"
  timeout_seconds: 120
  max_retries: 2
  max_tokens: null
  supports_vision: true
  image_max_dimension: 1280

inference:
  max_actions: 8
  min_confidence: 0.2
  enable_json_repair: true
  enable_risk_override: true

ui:
  title: "intent2action"
  subtitle: "Convert text and images into structured action candidates"
